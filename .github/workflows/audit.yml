name: Audit

on:
  # Weekly sweep so newly-published RUSTSEC advisories show up even if
  # no Cargo.lock change has happened.
  schedule:
    - cron: '17 6 * * 1'  # Mondays at 06:17 UTC

  # Fire on any Cargo.lock change so a new transitive dependency cannot
  # slip in a fresh advisory or a non-permissive license.
  push:
    branches: [main]
    paths:
      - 'core/Cargo.lock'
      - 'core/Cargo.toml'
      - 'core/**/Cargo.toml'
      - 'deny.toml'
      - '.github/workflows/audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'core/Cargo.lock'
      - 'core/Cargo.toml'
      - 'core/**/Cargo.toml'
      - 'deny.toml'
      - '.github/workflows/audit.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      # rustsec/audit-check ships a prebuilt cargo-audit binary, so we
      # avoid the multi-minute `cargo install --locked cargo-audit`
      # compile on every CI run.
      - name: Run cargo audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: core

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      # The action runs from $GITHUB_WORKSPACE (repo root). deny.toml lives
      # at the repo root, so --config is relative to repo root, not to
      # core/. (The deny.toml head comment shows the manual-invocation
      # equivalent: `cd core && cargo deny --config ../deny.toml`.)
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: core/Cargo.toml
          arguments: --config deny.toml --all-features
          command: check
