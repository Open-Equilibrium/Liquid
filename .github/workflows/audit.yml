name: Audit

on:
  # Weekly sweep so newly-published RUSTSEC advisories show up even if
  # no Cargo.lock change has happened.
  schedule:
    - cron: '17 6 * * 1'  # Mondays at 06:17 UTC

  # Fire on any Cargo.lock change so a new transitive dependency cannot
  # slip in a fresh advisory or a non-permissive license.
  push:
    branches: [main]
    paths:
      - 'core/Cargo.lock'
      - 'core/Cargo.toml'
      - 'core/**/Cargo.toml'
      - 'deny.toml'
      - '.github/workflows/audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'core/Cargo.lock'
      - 'core/Cargo.toml'
      - 'core/**/Cargo.toml'
      - 'deny.toml'
      - '.github/workflows/audit.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      # rustsec/audit-check ships a prebuilt cargo-audit binary, so we
      # avoid the multi-minute `cargo install --locked cargo-audit`
      # compile on every CI run.
      - name: Run cargo audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: core

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      # EmbarkStudios/cargo-deny-action@v2 splits action inputs into two
      # buckets, with the cargo-deny CLI laid out as:
      #
      #   cargo-deny <top-level flags> <command> <command-specific flags>
      #
      #   - `arguments`         → placed BEFORE <command> — top-level
      #                            flags only (--log-level, --target,
      #                            --all-features, --no-default-features,
      #                            --manifest-path …)
      #   - `command-arguments` → placed AFTER <command> — subcommand
      #                            flags only (for `check`: --config,
      #                            --hide-inclusion-graph, --exclude-dev,
      #                            plus the positional WHICH …)
      #
      # `--config` lives on `check`, so it goes in `command-arguments`.
      # We do not need `--all-features` because deny.toml's `[graph]`
      # explicitly sets `all-features = false` (and `targets =` limits
      # the graph walk to the Phase-1 desktop platforms — passing
      # `--all-features` at the CLI would override the targets filter
      # and re-introduce the wasi-only wit-bindgen duplicate that
      # tripped the `bans` rule on PR #9's first cargo-deny run).
      #
      # The action runs from $GITHUB_WORKSPACE (repo root), so the
      # config path is `deny.toml`, not `../deny.toml`.
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: core/Cargo.toml
          command: check
          command-arguments: --config deny.toml
