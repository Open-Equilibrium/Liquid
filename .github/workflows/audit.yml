name: Audit

on:
  # Weekly sweep so newly-published RUSTSEC advisories show up even if
  # no Cargo.lock change has happened.
  schedule:
    - cron: '17 6 * * 1'  # Mondays at 06:17 UTC

  # Fire on any Cargo.lock change so a new transitive dependency cannot
  # slip in a fresh advisory or a non-permissive license.
  push:
    branches: [main]
    paths:
      - 'core/Cargo.lock'
      - 'core/Cargo.toml'
      - 'core/**/Cargo.toml'
      - 'deny.toml'
      - '.github/workflows/audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'core/Cargo.lock'
      - 'core/Cargo.toml'
      - 'core/**/Cargo.toml'
      - 'deny.toml'
      - '.github/workflows/audit.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      # rustsec/audit-check ships a prebuilt cargo-audit binary, so we
      # avoid the multi-minute `cargo install --locked cargo-audit`
      # compile on every CI run.
      - name: Run cargo audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: core

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      # EmbarkStudios/cargo-deny-action@v2 splits action inputs into two
      # buckets:
      #   - `arguments`         → placed BEFORE the command (top-level
      #                            cargo-deny flags like --log-level)
      #   - `command-arguments` → placed AFTER the command (subcommand
      #                            flags like --config or --all-features)
      #
      # `--config` and `--all-features` are flags of `cargo-deny check`,
      # not of cargo-deny itself, so they must go in `command-arguments`.
      # The previous attempt put them in `arguments`, which produced
      # `error: unexpected argument '--config' found`.
      #
      # The action runs from $GITHUB_WORKSPACE (repo root), so the file
      # path is `deny.toml`, not `../deny.toml`. (The deny.toml head
      # comment's manual-invocation equivalent uses `../deny.toml` only
      # because the manual command first `cd core && ...`.)
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: core/Cargo.toml
          command: check
          command-arguments: --config deny.toml --all-features
