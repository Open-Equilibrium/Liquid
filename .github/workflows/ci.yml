name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust ─────────────────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: core

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  # ── Dart / Flutter (SDK) ──────────────────────────────────────────────────────
  sdk:
    name: Dart SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/liquid_sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test

  # ── Flutter app ────────────────────────────────────────────────────────────────
  app:
    name: Flutter app (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            runner: ubuntu-latest
          - target: windows
            runner: windows-latest
          - target: macos
            runner: macos-latest
          - target: ios
            runner: macos-latest
          - target: android
            runner: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Linux build deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Set up Android SDK
        if: matrix.target == 'android'
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting (linux runner only)
        if: matrix.target == 'linux'
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze (linux runner only)
        if: matrix.target == 'linux'
        run: flutter analyze

      - name: Unit + widget tests (linux runner only)
        if: matrix.target == 'linux'
        run: flutter test

      - name: Build (release)
        run: |
          case "${{ matrix.target }}" in
            linux)   flutter build linux --release ;;
            windows) flutter build windows --release ;;
            macos)   flutter build macos --release ;;
            ios)     flutter build ios --release --no-codesign ;;
            android) flutter build appbundle --release ;;
          esac
        shell: bash

  # ── Reference apps — enforce Platform Abstraction Contract ───────────────────
  apps-platform-check:
    name: App platform build (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [text_editor, spreadsheet, chart]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (catches no_platform_imports lint violations)
        run: flutter analyze

      - name: Build linux (validates single-SDK guarantee for one target)
        run: flutter build linux --release

  # ── CLI integration tests ─────────────────────────────────────────────────────
  cli:
    name: CLI bats tests
    runs-on: ubuntu-latest
    if: hashFiles('tests/cli/**') != ''

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build liquid CLI
        run: cargo build -p liquid-cli --manifest-path core/Cargo.toml

      - name: Install bats
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats-core
          /tmp/bats-core/install.sh /usr/local

      - name: Install bats helpers
        run: |
          mkdir -p test_helper
          git clone https://github.com/bats-core/bats-support.git test_helper/bats-support
          git clone https://github.com/bats-core/bats-assert.git  test_helper/bats-assert

      - name: Run CLI tests
        run: bats tests/cli/
        env:
          LIQUID_BIN: ${{ github.workspace }}/core/target/debug/liquid
