name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust ─────────────────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    if: hashFiles('core/Cargo.toml') != ''
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: core

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Coverage (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-tarpaulin --locked
          cargo tarpaulin --workspace --out Xml --output-dir ../coverage/rust/

      - name: Upload Rust coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/rust/cobertura.xml
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Dart / Flutter (SDK) ──────────────────────────────────────────────────────
  sdk:
    name: Dart SDK
    if: hashFiles('sdk/liquid_sdk/pubspec.yaml') != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/liquid_sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Tests with coverage
        run: flutter test --coverage

      - name: Upload SDK coverage
        uses: codecov/codecov-action@v4
        with:
          files: sdk/liquid_sdk/coverage/lcov.info
          flags: sdk
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Flutter app ────────────────────────────────────────────────────────────────
  app:
    name: Flutter app (${{ matrix.target }})
    if: hashFiles('app/pubspec.yaml') != ''
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            runner: ubuntu-latest
          - target: windows
            runner: windows-latest
          - target: macos
            runner: macos-latest
          - target: ios
            runner: macos-latest
          - target: android
            runner: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Linux build deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Set up Android SDK
        if: matrix.target == 'android'
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting (once, on linux runner)
        if: matrix.target == 'linux'
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze (once, on linux runner)
        if: matrix.target == 'linux'
        run: flutter analyze

      - name: Unit + widget tests with coverage (once, on linux runner)
        if: matrix.target == 'linux'
        run: flutter test --coverage

      - name: Upload app coverage
        if: matrix.target == 'linux'
        uses: codecov/codecov-action@v4
        with:
          files: app/coverage/lcov.info
          flags: app
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build (release)
        run: |
          case "${{ matrix.target }}" in
            linux)   flutter build linux --release ;;
            windows) flutter build windows --release ;;
            macos)   flutter build macos --release ;;
            ios)     flutter build ios --release --no-codesign ;;
            android) flutter build appbundle --release ;;
          esac
        shell: bash

  # ── Reference apps — enforce Platform Abstraction Contract (ADR-008) ──────────
  apps-platform-check:
    name: App platform check (${{ matrix.app }})
    if: hashFiles('apps/text_editor/pubspec.yaml') != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [text_editor, spreadsheet, chart]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (enforces no_platform_imports lint)
        run: flutter analyze

      - name: Build linux (validates single-SDK guarantee)
        run: flutter build linux --release

  # ── CLI integration tests ─────────────────────────────────────────────────────
  cli:
    name: CLI bats tests
    if: hashFiles('tests/cli/**') != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build liquid CLI
        run: cargo build -p liquid-cli --manifest-path core/Cargo.toml

      - name: Install bats + helpers
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats-core
          /tmp/bats-core/install.sh /usr/local
          mkdir -p test_helper
          git clone https://github.com/bats-core/bats-support.git test_helper/bats-support
          git clone https://github.com/bats-core/bats-assert.git  test_helper/bats-assert

      - name: Run CLI tests
        run: bats tests/cli/
        env:
          LIQUID_BIN: ${{ github.workspace }}/core/target/debug/liquid
