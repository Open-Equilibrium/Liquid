name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which layers are present ──────────────────────────────────────────
  # GitHub Actions does not allow `hashFiles()` in job-level `if:` expressions,
  # so we run a single detect job first and gate every other job on its outputs.
  # Each output is a literal "true" / "false" string.
  detect:
    name: Detect layers
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.check.outputs.rust }}
      sdk: ${{ steps.check.outputs.sdk }}
      app: ${{ steps.check.outputs.app }}
      apps: ${{ steps.check.outputs.apps }}
      cli: ${{ steps.check.outputs.cli }}
    steps:
      - uses: actions/checkout@v5

      - id: check
        shell: bash
        run: |
          set -euo pipefail
          exists() { [ -e "$1" ] && echo "true" || echo "false"; }
          {
            echo "rust=$(exists core/Cargo.toml)"
            echo "sdk=$(exists sdk/liquid_sdk/pubspec.yaml)"
            echo "app=$(exists app/pubspec.yaml)"
            echo "apps=$(exists apps/text_editor/pubspec.yaml)"
            if compgen -G "tests/cli/*" > /dev/null; then
              echo "cli=true"
            else
              echo "cli=false"
            fi
          } >> "$GITHUB_OUTPUT"

  # ── Rust ─────────────────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    needs: detect
    if: needs.detect.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: core

    env:
      CARGO_TERM_COLOR: always
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_TIMEOUT: "120"
      RUST_BACKTRACE: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (pinned via core/rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Tests
        run: cargo test --workspace --locked

      - name: Coverage (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-tarpaulin --locked --version ^0.31
          cargo tarpaulin --workspace --out Xml --output-dir ../coverage/rust/ --skip-clean

      - name: Upload Rust coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/rust/cobertura.xml
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Dart / Flutter (SDK) ──────────────────────────────────────────────────────
  sdk:
    name: Dart SDK
    needs: detect
    if: needs.detect.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/liquid_sdk

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Tests with coverage
        run: flutter test --coverage

      - name: Upload SDK coverage
        uses: codecov/codecov-action@v5
        with:
          files: sdk/liquid_sdk/coverage/lcov.info
          flags: sdk
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Flutter app ────────────────────────────────────────────────────────────────
  app:
    name: Flutter app (${{ matrix.target }})
    needs: detect
    if: needs.detect.outputs.app == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            runner: ubuntu-latest
          - target: windows
            runner: windows-latest
          - target: macos
            runner: macos-latest
          - target: ios
            runner: macos-latest
          - target: android
            runner: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Linux build deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Set up Android SDK
        if: matrix.target == 'android'
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting (once, on linux runner)
        if: matrix.target == 'linux'
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze (once, on linux runner)
        if: matrix.target == 'linux'
        run: flutter analyze

      - name: Unit + widget tests with coverage (once, on linux runner)
        if: matrix.target == 'linux'
        run: flutter test --coverage

      - name: Upload app coverage
        if: matrix.target == 'linux'
        uses: codecov/codecov-action@v5
        with:
          files: app/coverage/lcov.info
          flags: app
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build (release)
        run: |
          case "${{ matrix.target }}" in
            linux)   flutter build linux --release ;;
            windows) flutter build windows --release ;;
            macos)   flutter build macos --release ;;
            ios)     flutter build ios --release --no-codesign ;;
            android) flutter build appbundle --release ;;
          esac
        shell: bash

  # ── Reference apps — enforce Platform Abstraction Contract (ADR-008) ──────────
  apps-platform-check:
    name: App platform check (${{ matrix.app }})
    needs: detect
    if: needs.detect.outputs.apps == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [text_editor, spreadsheet, chart]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (enforces no_platform_imports lint)
        run: flutter analyze

      - name: Build linux (validates single-SDK guarantee)
        run: flutter build linux --release

  # ── CLI integration tests ─────────────────────────────────────────────────────
  cli:
    name: CLI bats tests
    needs: detect
    if: needs.detect.outputs.cli == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_TIMEOUT: "120"

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build liquid CLI
        run: cargo build -p liquid-cli --manifest-path core/Cargo.toml --locked

      - name: Install bats + helpers
        run: |
          # bats-core's install.sh writes into /usr/local/{bin,libexec,lib,share}
          # which requires root on the GitHub-hosted Ubuntu runner. Without
          # sudo the install silently fails and the bats binary is missing
          # for the next step — which is what failed the CLI job on PR #8.
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          mkdir -p test_helper
          git clone --depth 1 https://github.com/bats-core/bats-support.git test_helper/bats-support
          git clone --depth 1 https://github.com/bats-core/bats-assert.git  test_helper/bats-assert

      - name: Run CLI tests
        run: bats tests/cli/
        env:
          LIQUID_BIN: ${{ github.workspace }}/core/target/debug/liquid
