[workspace]
resolver = "2"
members = [
    "liquid-core",
    "liquid-vcs",
    "liquid-auth",
    "liquid-permissions",
    "liquid-cache",
    "liquid-bindings",
    "liquid-sdk-bridge",
    "liquid-cli",
]

[workspace.package]
# ── LIQUID_VERSION ─────────────────────────────────────────────────────────────
# Single source of truth for the workspace release version. The literal
# here AND every `liquid-* = { path = "...", version = "..." }` literal in
# [workspace.dependencies] below must move in lock-step.
#
# DO NOT edit by hand. Run:
#   just bump-version <new-semver>
# which invokes `scripts/bump-version.sh` to rewrite all 8 occurrences
# atomically (1 here + 7 path-deps). Covered by
# `tests/cli/02_bump_version.bats`.
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/open-equilibrium/liquid"
# Minimum Supported Rust Version. Kept in lock-step with:
#   - core/rust-toolchain.toml  (toolchain pin used by `rustup` locally)
#   - .github/workflows/ci.yml  (dtolnay/rust-toolchain @master `toolchain:`)
# Bump all three together; never let CI drift to "stable". See CLAUDE.md
# "Cloud notes" for the policy.
rust-version = "1.94"

[workspace.dependencies]
# Workspace-internal crates. Both `path` and `version` are set so
# cargo-deny (and crates.io's path-publish requirement) sees an explicit
# version constraint rather than treating these as wildcard deps. The
# version literal here is kept in lock-step with [workspace.package].version
# above — `just bump-version <new-semver>` rewrites both atomically.
liquid-core = { path = "liquid-core", version = "0.1.0" }
liquid-vcs = { path = "liquid-vcs", version = "0.1.0" }
liquid-auth = { path = "liquid-auth", version = "0.1.0" }
liquid-permissions = { path = "liquid-permissions", version = "0.1.0" }
liquid-cache = { path = "liquid-cache", version = "0.1.0" }
liquid-bindings = { path = "liquid-bindings", version = "0.1.0" }
liquid-sdk-bridge = { path = "liquid-sdk-bridge", version = "0.1.0" }

async-trait = "0.1"
bytes = { version = "1.7", features = ["serde"] }
dashmap = "6.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tempfile = "3.10"
thiserror = "1.0"
tokio = { version = "1.38", default-features = false }
uuid = { version = "1.10", features = ["v4", "serde"] }

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "warn"
unimplemented = "warn"
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
