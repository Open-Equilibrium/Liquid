# cargo-deny configuration for the Liquid Rust workspace.
#
# Local invocation (matches `just deny-check` and CI):
#
#     cargo deny --manifest-path core/Cargo.toml check --config deny.toml
#
# `just deny-check` wraps that command; `just check` chains it after
# `lint` and `test` so every pre-push validation cycle catches
# advisory/license/ban regressions before the push. The lefthook
# `pre-push` hook runs the same recipe.
#
# CI runs the same command in .github/workflows/audit.yml weekly and on
# every Cargo.lock change so a new dependency cannot smuggle in a
# GPL-licensed crate or a fresh advisory without us noticing.

[graph]
# Limit checks to Phase-1's actual target set (Linux / macOS / Windows
# desktop, x86_64 + aarch64). Without this, cargo-deny walks every
# transitive dep on every target — including wasi targets that pull
# `wasip2`/`wasip3` via `getrandom`, which in turn bring in *two*
# semver-major `wit-bindgen` versions (0.51 + 0.57) and trip the
# `bans.multiple-versions = "deny"` rule on a platform we do not ship.
# Phase 3 adds iOS / Android; expand this list then.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "aarch64-pc-windows-msvc" },
]
all-features = false
no-default-features = false

# ── Vulnerability advisories ─────────────────────────────────────────────────
[advisories]
version = 2
# CI fails on any advisory matching the workspace's dependency graph.
yanked = "deny"
ignore = []
# `db-path` and `db-urls` default to the official rustsec database.

# ── License policy ───────────────────────────────────────────────────────────
# Policy: Liquid is shipped under Apache-2.0 (see LICENSE). Transitive
# dependencies must therefore use a license that is *compatible* with our
# Apache-2.0 release. We allow ONLY the licenses that some crate in the
# current dependency graph actually uses:
#
#   - Apache-2.0 (matches the project license)
#   - MIT / BSD-2/3-Clause / ISC (permissive, fully compatible with Apache-2.0)
#   - Unicode-3.0 (current `unicode-ident` ships under
#     `(MIT OR Apache-2.0) AND Unicode-3.0` — the `AND` makes
#     Unicode-3.0 mandatory)
#
# Allowances are added one at a time as a real new transitive dependency
# requires them — never speculatively. `Zlib` and `CC0-1.0` were
# allowed historically but no crate in the workspace actually used
# them, so they were dropped (cargo-deny emitted
# `license-not-encountered` warnings on every run). `Unicode-DFS-2016`
# was also unused at trim time and removed for the same reason; re-add
# only when a crate genuinely requires it (the failure mode is a clean
# cargo-deny error pointing at the rejecting crate, which lets us
# audit and re-add intentionally).
#
# We deny *every* copyleft license outright — GPL/LGPL/AGPL/MPL/CC* require
# additional release-time effort that pre-1.0 Liquid is not equipped to
# absorb. The deny list below is explicit so a future contributor can see
# why a particular crate was rejected.
[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
]
confidence-threshold = 0.93
exceptions = []

# Explicitly reject the entire copyleft family. cargo-deny would already
# refuse anything outside `allow`; listing them explicitly makes the
# intent obvious to future readers.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# ── Bans: duplicate semver-major versions ────────────────────────────────────
# Same-major duplicates inflate compile time, bloat the binary, and almost
# always indicate that a dependency hasn't been bumped consistently. We
# fail on them so the human has to make an explicit decision.
[bans]
multiple-versions = "deny"
wildcards = "deny"
# Workspace-local crates referenced via `path = "..."` deps have no
# version constraint (cargo treats them as a wildcard). We want to keep
# `wildcards = "deny"` so a real `foo = "*"` in a Cargo.toml is caught,
# but we have to exempt the workspace-internal path deps explicitly.
allow-wildcard-paths = true
highlight = "all"
allow = []
deny = [
    { name = "openssl-sys" },     # we use rustls-based stacks
]
skip = [
    # `argon2 0.5` (used in liquid-auth for password hashing) pins
    # `rand_core 0.6`, which pins `getrandom 0.2`, while `tempfile` and
    # `uuid` are on `getrandom 0.4`. The duplicate is upstream and
    # resolves itself once argon2 ships a release on the new rand_core /
    # getrandom line. Revisit when bumping `argon2` past 0.5.x.
    { name = "getrandom" },
]
skip-tree = []

# ── Source policy ────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
